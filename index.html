// ─── CUSTOM SVG CHARTS (no external library) ──────────────────────────────────
function useContainerWidth(ref){
  const [w,setW]=useState(600);
  useEffect(()=>{
    if(!ref.current)return;
    const ro=new ResizeObserver(e=>setW(Math.max(e[0].contentRect.width,100)));
    ro.observe(ref.current);
    return()=>ro.disconnect();
  },[]);
  return w;
}

// Colored bar chart (one color per bar via colorFn)
function SvgBarChart({data,dataKey,colorFn,xKey='m',yFmt=v=>v,height=130}){
  const ref=useRef(null); const w=useContainerWidth(ref);
  const [tip,setTip]=useState(null);
  const pad={l:36,r:8,t:8,b:22};
  const cW=w-pad.l-pad.r, cH=height-pad.t-pad.b;
  const vals=data.map(d=>d[dataKey]).filter(v=>v!=null&&!isNaN(v));
  const maxV=Math.max(...vals,0.01);
  const gap=cW/data.length;
  const bW=Math.max(3,gap*0.65);
  const yTicks=[0,maxV*0.5,maxV].map(v=>parseFloat(v.toFixed(1)));
  return(
    <div ref={ref} style={{width:'100%',height}}>
      <svg width={w} height={height}>
        {yTicks.map((t,i)=>{const y=pad.t+cH-(t/maxV)*cH;return(<g key={i}><line x1={pad.l} y1={y} x2={pad.l+cW} y2={y} stroke={BORDER} strokeDasharray="3 3"/><text x={pad.l-3} y={y+3} textAnchor="end" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{yFmt(t)}</text></g>);})}
        {data.map((d,i)=>{
          const v=d[dataKey]; if(v==null||isNaN(v))return null;
          const bH=(v/maxV)*cH; const x=pad.l+i*gap+(gap-bW)/2; const y=pad.t+cH-bH;
          const fill=colorFn?colorFn(v):'#5aab1f';
          return(<rect key={i} x={x} y={y} width={bW} height={Math.max(bH,0)} fill={fill} rx={2} onMouseEnter={()=>setTip({x:x+bW/2,y,v,label:d[xKey]})} onMouseLeave={()=>setTip(null)}/>);
        })}
        {data.map((d,i)=>{if(i%(Math.ceil(data.length/8))!==0&&i!==data.length-1)return null;return(<text key={i} x={pad.l+i*gap+gap/2} y={height-4} textAnchor="middle" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{d[xKey]}</text>);})}
        <line x1={pad.l} y1={pad.t+cH} x2={pad.l+cW} y2={pad.t+cH} stroke={BORDER2}/>
        {tip&&(<g><rect x={Math.min(tip.x-24,w-54)} y={tip.y-28} width={48} height={20} rx={3} fill="#0d0d0d" opacity={0.82}/><text x={Math.min(tip.x-24,w-54)+24} y={tip.y-14} textAnchor="middle" fontSize={9} fill="#fff" fontWeight="700" fontFamily={FONT_BODY}>{yFmt(tip.v)}</text></g>)}
      </svg>
    </div>
  );
}

// Multi-series bar chart (grouped, two bars per data point)
function SvgGroupedBarChart({data,series,xKey='m',height=120}){
  const ref=useRef(null); const w=useContainerWidth(ref);
  const [tip,setTip]=useState(null);
  const pad={l:30,r:8,t:8,b:22};
  const cW=w-pad.l-pad.r, cH=height-pad.t-pad.b;
  const allVals=series.flatMap(s=>data.map(d=>d[s.key]||0));
  const maxV=Math.max(...allVals,0.01);
  const gap=cW/data.length;
  const groupW=gap*0.8; const bW=groupW/series.length;
  const yTicks=[0,Math.round(maxV*0.5),Math.round(maxV)];
  return(
    <div ref={ref} style={{width:'100%',height}}>
      <svg width={w} height={height}>
        {yTicks.map((t,i)=>{const y=pad.t+cH-(t/maxV)*cH;return(<g key={i}><line x1={pad.l} y1={y} x2={pad.l+cW} y2={y} stroke={BORDER} strokeDasharray="3 3"/><text x={pad.l-3} y={y+3} textAnchor="end" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{t}</text></g>);})}
        {data.map((d,di)=>series.map((s,si)=>{
          const v=d[s.key]||0; const bH=(v/maxV)*cH;
          const x=pad.l+di*gap+(gap-groupW)/2+si*bW; const y=pad.t+cH-bH;
          return(<rect key={`${di}-${si}`} x={x} y={y} width={Math.max(bW-1,2)} height={Math.max(bH,0)} fill={s.fill} rx={2} onMouseEnter={()=>setTip({x:x+bW/2,y,label:s.name,v})} onMouseLeave={()=>setTip(null)}/>);
        }))}
        {data.map((d,i)=>{if(i%(Math.ceil(data.length/8))!==0&&i!==data.length-1)return null;return(<text key={i} x={pad.l+i*gap+gap/2} y={height-4} textAnchor="middle" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{d[xKey]}</text>);})}
        <line x1={pad.l} y1={pad.t+cH} x2={pad.l+cW} y2={pad.t+cH} stroke={BORDER2}/>
        {/* Legend */}
        {series.map((s,i)=>(<g key={i}><rect x={pad.l+i*70} y={2} width={8} height={8} fill={s.fill} rx={1}/><text x={pad.l+i*70+11} y={9} fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{s.name}</text></g>))}
        {tip&&(<g><rect x={Math.min(tip.x-24,w-60)} y={tip.y-28} width={56} height={20} rx={3} fill="#0d0d0d" opacity={0.82}/><text x={Math.min(tip.x-24,w-60)+28} y={tip.y-14} textAnchor="middle" fontSize={9} fill="#fff" fontWeight="700" fontFamily={FONT_BODY}>{tip.label}: {tip.v}</text></g>)}
      </svg>
    </div>
  );
}

// Multi-line chart
function SvgLineChart({data,lines=[],xKey='m',height=100}){
  const ref=useRef(null); const w=useContainerWidth(ref);
  const [tip,setTip]=useState(null);
  const pad={l:30,r:8,t:8,b:22};
  const cW=w-pad.l-pad.r, cH=height-pad.t-pad.b;
  const allVals=lines.flatMap(l=>data.map(d=>d[l.key]).filter(v=>v!=null&&!isNaN(v)));
  const maxV=Math.max(...allVals,0.01); const minV=0;
  const xS=i=>pad.l+(i/(Math.max(data.length-1,1)))*cW;
  const yS=v=>pad.t+cH-((v-minV)/(maxV-minV||1))*cH;
  const yTicks=[0,Math.round(maxV*0.5),Math.round(maxV)];
  return(
    <div ref={ref} style={{width:'100%',height}}>
      <svg width={w} height={height}>
        {yTicks.map((t,i)=>{const y=yS(t);return(<g key={i}><line x1={pad.l} y1={y} x2={pad.l+cW} y2={y} stroke={BORDER} strokeDasharray="3 3"/><text x={pad.l-3} y={y+3} textAnchor="end" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{t}</text></g>);})}
        {lines.map((l,li)=>{
          const pts=data.map((d,i)=>{const v=d[l.key];return v!=null?`${xS(i)},${yS(v)}`:null;}).filter(Boolean).join(' ');
          return(<polyline key={li} points={pts} fill="none" stroke={l.stroke||'#34d399'} strokeWidth={l.width||2}/>);
        })}
        {data.map((d,i)=>{if(i%(Math.ceil(data.length/7))!==0&&i!==data.length-1)return null;return(<text key={i} x={xS(i)} y={height-4} textAnchor="middle" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{d[xKey]}</text>);})}
        <line x1={pad.l} y1={pad.t+cH} x2={pad.l+cW} y2={pad.t+cH} stroke={BORDER2}/>
        {lines.length>1&&lines.map((l,i)=>(<g key={i}><line x1={pad.l+i*70} y1={height-2} x2={pad.l+i*70+14} y2={height-2} stroke={l.stroke} strokeWidth={2}/><text x={pad.l+i*70+17} y={height-1} fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{l.name}</text></g>))}
      </svg>
    </div>
  );
}

function personMonthly(accs) {
  return ALL_M.map(m=>{
    const mi=mIdx(m); let ac=0,cl=0;
    accs.forEach(a=>{
      const s=mIdx(a.start),e=a.end?mIdx(a.end):Infinity;
      if(s<=mi){if(!a.end)ac++;else if(e===mi)cl++;else if(e>mi)ac++;}
    });
    return{m,ac,cl};
  }).filter(d=>d.ac>0||d.cl>0);
}
function personCR(accs){
  const mo=personMonthly(accs);
  return withCR(mo).filter(d=>d.cr!==null&&d.ac>0);
}

function sqlPaceStatus(cur, marchSQL){
  if(marchSQL===null||marchSQL===undefined) return {label:"No May baseline",color:MUTED};
  const pct=marchSQL>0?cur/marchSQL:null;
  if(pct===null) return {label:"No May data",color:MUTED};
  if(pct>=1.1)   return {label:"Exceeding May",color:G};
  if(pct>=0.95)  return {label:"Matching May",color:"#f5c518"};
  if(pct>=0.5)   return {label:"Below May",color:"#f97316"};
  return           {label:"Well below May",color:"#ef4444"};
}

function paceCol(val,key){
  if(key==="mtg") return val>=8?"#3a8c0f":val>=4?"#f5c518":val>=1?"#f97316":"#ef4444";
  if(key==="sql") return val>=15?"#3a8c0f":val>=8?"#f5c518":val>=3?"#f97316":"#ef4444";
  if(key==="mql") return val>=40?"#3a8c0f":val>=20?"#f5c518":val>=8?"#f97316":"#ef4444";
  return MUTED;
}

function SomPaceTable({reps}){
  const rows=reps.filter(r=>REP_PACE[r]).map(r=>({name:r,...REP_PACE[r]}));
  if(!rows.length) return null;
  const sorted=[...rows].sort((a,b)=>{
    const projA=a.marchSQL?Math.round(a.curSQL/APR_ELAPSED)/a.marchSQL:0;
    const projB=b.marchSQL?Math.round(b.curSQL/APR_ELAPSED)/b.marchSQL:0;
    return projB-projA;
  });
  const totals={
    mql:rows.reduce((s,r)=>s+r.curMQL,0), sql:rows.reduce((s,r)=>s+r.curSQL,0), mtg:rows.reduce((s,r)=>s+r.curMtg,0),

// Uses visibility:hidden trick — only the modal prints, rest of page hidden
function usePrintStyle(){
  useEffect(()=>{
    const s=document.createElement('style');
    s.id='__mp';
    s.textContent=`@media print{body *{visibility:hidden!important}#__mpm,#__mpm *{visibility:visible!important}#__mpm{position:fixed;top:0;left:0;width:100%;padding:0}.__nop{display:none!important}}`;
    document.head.appendChild(s);
    return()=>document.getElementById('__mp')?.remove();
  },[]);
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){resolve();return;}
    const s=document.createElement('script');
    s.src=src; s.onload=resolve; s.onerror=reject;
    document.head.appendChild(s);
  });
}

const G_RGB=[90,171,31], DARK_RGB=[13,13,13], MUTED_RGB=[112,112,112], RED_RGB=[239,68,68], BORDER_RGB=[212,212,212], STRIPE_RGB=[243,243,243];

function pdfText(doc,txt,x,y,opts={}){
  if(txt==null) return;
  doc.text(String(txt),x,y,opts);
}

async function buildRepPDF(repName, accs){
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');
  const W=210, M=12;
  const p=REP_PACE[repName];
  const active=accs.filter(a=>!a.end);
  const churned=accs.filter(a=>a.end);
  const today=new Date().toLocaleDateString('en-CA');
  let y=0;

  // ── Green header bar ──
  doc.setFillColor(...G_RGB);
  doc.rect(0,0,W,16,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(12); doc.setFont('helvetica','bold');
  pdfText(doc,'MARTAL GROUP',M,8);
  doc.setFontSize(7); doc.setFont('helvetica','normal');
  pdfText(doc,'B2B Lead Generation — Internal Use Only',M,13);
  pdfText(doc,'CONFIDENTIAL',W-M,8,{align:'right'});
  pdfText(doc,`Generated: ${today}`,W-M,13,{align:'right'});
  y=24;

  // ── Rep name ──
  doc.setTextColor(...DARK_RGB);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  pdfText(doc,repName,M,y); y+=6;
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.setTextColor(...MUTED_RGB);
  pdfText(doc,`Sales Rep  ·  Period 6/16–7/15  ·  ${active.length} active  ·  ${churned.length} churned`,M,y); y+=5;
  doc.setDrawColor(...BORDER_RGB); doc.line(M,y,W-M,y); y+=7;

  // ── Performance — July 15 Period Complete ──
  if(p){
    // Section label + rank badges (May + July)
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.setTextColor(...MUTED_RGB);
    pdfText(doc,'PERFORMANCE — JULY 15 PERIOD COMPLETE (6/16–7/15)',M,y);
    // Two stacked rank badges on right: May Rank + July Rank
    const rankW=26, rankH=10, rankGap=2;
    let rx = W - M - (rankW*2 + rankGap);
    if(p.marchRank!=null){
      doc.setFillColor(...DARK_RGB);
      doc.roundedRect(rx,y-6,rankW,rankH,1.5,1.5,'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(5.5);
      pdfText(doc,'MAY RANK (PREV)',rx+rankW/2,y-2,{align:'center'});
      doc.setFontSize(9); doc.setFont('helvetica','bold');
      pdfText(doc,`#${p.marchRank}`,rx+rankW/2,y+3,{align:'center'});
      rx += rankW + rankGap;
    }
    if(p.aprRank!=null){
      doc.setFillColor(...DARK_RGB);
      doc.roundedRect(rx,y-6,rankW,rankH,1.5,1.5,'F');
      doc.setTextColor(...G_RGB);
      doc.setFontSize(5.5); doc.setFont('helvetica','bold');
      pdfText(doc,'JULY RANK',rx+rankW/2,y-2,{align:'center'});
      doc.setFontSize(9);
      pdfText(doc,`#${p.aprRank}`,rx+rankW/2,y+3,{align:'center'});
    }
    y+=8;

    // Overall status line (Exceeding / Matching / Below May)
    if(p.marchSQL && p.curSQL!=null){
      const sqlPct = p.curSQL / p.marchSQL;
      const statusLabel = sqlPct>=1.1 ? 'Exceeding May' : sqlPct>=0.95 ? 'Matching May' : sqlPct>=0.5 ? 'Below May' : 'Well below May';
      const statusCol = sqlPct>=1.1 ? G_RGB : sqlPct>=0.95 ? [245,197,24] : sqlPct>=0.5 ? [249,115,22] : RED_RGB;
      doc.setFontSize(8); doc.setFont('helvetica','bold');
      doc.setTextColor(...statusCol);
      pdfText(doc,statusLabel,M,y);
      y+=5;
    }

    const metrics=[
      {label:'SQLs',    march:p.marchSQL,   cur:p.curSQL,  key:'sql', barMax:60},
      {label:'Meetings',march:p.marchFlips, cur:p.curMtg,  key:'mtg', barMax:35},
      {label:'MQLs',    march:p.marchMQL,   cur:p.curMQL,  key:'mql', barMax:160},
    ];
    const barL=46, barR=W-M-40, barW=barR-barL;  // leave 40mm on right for text labels
    const pctCol=(pct)=>pct>=110?G_RGB:pct>=95?[245,197,24]:pct>=50?[249,115,22]:[239,68,68];

    for(const m of metrics){
      const delta = m.march!=null ? m.cur - m.march : null;
      const pct = m.march>0 ? Math.round((m.cur/m.march)*100) : null;
      const bMax = Math.max(m.march||1, m.cur, 1);

      // Metric header with % of May + delta vs May on right
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.setTextColor(...MUTED_RGB);
      pdfText(doc,m.label.toUpperCase(),M,y);
      if(pct!=null){
        doc.setTextColor(...pctCol(pct));
        pdfText(doc,`${pct}% of May`,barR+2,y);
      }
      if(delta!=null){
        const dc = delta>0 ? G_RGB : delta<0 ? RED_RGB : [245,197,24];
        doc.setTextColor(...dc);
        pdfText(doc,`${delta>0?'+':''}${delta} vs May`,W-M,y,{align:'right'});
      }
      y+=4.5;

      // May 15 Final row
      doc.setFontSize(7.5); doc.setFont('helvetica','normal');
      doc.setTextColor(...MUTED_RGB);
      pdfText(doc,'May 15 Final',M,y);
      pdfText(doc,String(m.march??'—'),barL-2,y,{align:'right'});
      doc.setFillColor(190,190,190);
      const mW = m.march!=null ? (m.march/bMax)*barW : 0;
      doc.rect(barL, y-2.8, mW, 2, 'F');
      y+=4;

      // July 15 Final row
      doc.setFont('helvetica','bold');
      doc.setTextColor(...G_RGB);
      pdfText(doc,'July 15 Final',M,y);
      pdfText(doc,String(m.cur),barL-2,y,{align:'right'});
      doc.setFillColor(...G_RGB);

// Helpers
function somStatus(g){
  if(!g) return {label:"—",color:"#9ca3af",bg:"#20242b"};
  if(g.mtgApr === null && g.q1 === 0) return {label:"NO ACTIVITY",color:"#9ca3af",bg:"#20242b"};
  if(g.q1 === 0) return {label:"NO BASELINE",color:"#9ca3af",bg:"#20242b"};
  if(g.q2 > g.budget) return {label:"OVER TARGET",color:"#dc2626",bg:"#2a1214"};
  if(g.q2 === g.budget) return {label:"AT LIMIT",color:"#ea580c",bg:"#2a1e0e"};
  if(g.aprR <= g.q2tr) return {label:"ON TRACK",color:"#16a34a",bg:"#0f2015"};
  return {label:"WATCH",color:"#f59e0b",bg:"#2a1e0e"};
}

}

    acc.q2Total += g.q2;
    acc.aprChurns += g.apr;
    acc.marChurns += g.mar;
    acc.aprAccts += g.aprAccts;
    acc.aprFlips += g.aprFlips;
    if(g.mtgPct >= 100) acc.goalMet++;
    else if(g.mtgPct >= 75) acc.nearGoal++;
    if(g.q1 > 0) acc.withBaseline++;
    return acc;
  }, {q1Churns:0, q2Budget:0, q2Total:0, aprChurns:0, marChurns:0, aprAccts:0, aprFlips:0, goalMet:0, nearGoal:0, withBaseline:0});
  // Include No SOM Account in q2 + apr totals
  const noSomG = CHURN_GOALS["No SOM Account"];
  const aprChurnsAll = totals.aprChurns + (noSomG ? noSomG.apr : 0);
  const q2TotalAll = totals.q2Total + (noSomG ? noSomG.q2 : 0);
  const q2BudgetAll = totals.q2Budget + (noSomG ? noSomG.budget : 0);
  
  const companyMtgAvg = totals.aprAccts > 0 ? (totals.aprFlips / totals.aprAccts) : 0;
  const companyPctOfGoal = Math.round((companyMtgAvg / 4) * 100);
  const aprChurnsCol = q2TotalAll > q2BudgetAll ? "#dc2626" : q2TotalAll === q2BudgetAll ? "#ea580c" : G;
  
  return (<div>
    <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
      <KpiCard label="Q1 TOTAL CHURNS" value={totals.q1Churns} sub="Jan–Mar baseline"/>
      <KpiCard label="Q2 BUDGET (MAX)" value={q2BudgetAll} sub="10% reduction target" valColor={G}/>
      <KpiCard label="APRIL CHURNS" value={aprChurnsAll} sub={"Q2 actual: "+q2TotalAll+" / "+q2BudgetAll+" budget"} valColor={aprChurnsCol}/>
      <KpiCard label="AVG MTG / ACCOUNT" value={companyMtgAvg.toFixed(2)} sub="company-wide, May 16–Jun 15" valColor={companyMtgAvg>=4?G:(companyMtgAvg>=3?"#f59e0b":"#ef4444")}/>
      <KpiCard label="MTG GOAL (4/MO)" value={companyPctOfGoal+"%"} sub={totals.goalMet+" SOMs at goal"} valColor={companyPctOfGoal>=100?G:(companyPctOfGoal>=75?"#f59e0b":"#ef4444")}/>
    </div>
    
    <div style={{fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",color:MUTED,fontFamily:FONT_BODY,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
      <div style={{width:16,height:2,background:"#8ed122"}}/>SOM Performance — April 2026
    </div>
    
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))",gap:12,marginBottom:18}}>
      {allSoms.map(name=>{
        const g = CHURN_GOALS[name];
        const st = somStatus(g);
        const hasParen = name.indexOf(" (") !== -1;
        const displayName = hasParen ? name.split(" (")[0] : name;
        const subtitle = hasParen ? name.substring(name.indexOf("(")) : null;
        const mtgColor = g.mtgApr === null ? MUTED : (g.mtgPct>=100?"#16a34a":(g.mtgPct>=75?"#f59e0b":"#dc2626"));
        const aprRateCol = g.aprR === 0 ? G : g.aprR <= g.q2tr ? G : g.aprR <= g.q1r ? "#f59e0b" : "#ef4444";
        const mayRateCol = g.mayR === 0 ? G : g.mayR <= g.q2tr ? G : g.mayR <= g.q1r ? "#f59e0b" : "#ef4444";
        return (<div key={name} onClick={()=>onSelect(name)} style={{background:st.bg,border:"1px solid "+st.color+"33",borderLeft:"3px solid "+st.color,borderRadius:6,padding:16,cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4,gap:8}}>
            <div style={{minWidth:0,flex:1}}>
              <div style={{fontSize:15,fontWeight:800,color:TEXT,fontFamily:FONT_DISPLAY,lineHeight:1.2}}>{displayName}</div>
              {subtitle && <div style={{fontSize:9,color:MUTED,fontFamily:FONT_BODY,marginTop:2}}>{subtitle}</div>}
            </div>
            <div style={{fontSize:8,fontWeight:800,letterSpacing:"1px",padding:"3px 7px",background:"#141414",color:st.color,borderRadius:3,fontFamily:FONT_BODY,whiteSpace:"nowrap",border:"1px solid "+st.color+"55"}}>{st.label}</div>
          </div>
          <div style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY,marginBottom:14}}>
            <span style={{color:"#8ed122",fontWeight:700}}>{g.active}</span> active &nbsp;·&nbsp; <span style={{color:"#dc2626",fontWeight:700}}>{g.churned}</span> churned
          </div>
          
          {/* CHURN ROW — Q1 baseline → Q2 actual (April closed) */}
          <div style={{background:CARD,borderRadius:4,padding:"10px 12px",marginBottom:8,border:"1px solid "+BORDER}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <div style={{fontSize:8,color:MUTED,fontFamily:FONT_BODY,fontWeight:700,letterSpacing:"0.8px"}}>CHURN — Q1 BASELINE → Q2 ACTUAL</div>
              <div style={{fontSize:8,color:mayRateCol,fontFamily:FONT_BODY,fontWeight:700,letterSpacing:"0.8px"}}>MAY: {g.mayR!=null?g.mayR+"%":"—"} · APR: {g.aprR!=null?g.aprR+"%":"—"}</div>
            </div>
            {g.q1 > 0 ? (
              <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
                <div><span style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY}}>Q1: </span><span style={{fontSize:13,fontWeight:800,color:"#ef4444",fontFamily:FONT_DISPLAY}}>{g.q1r}%</span></div>
                <div style={{color:MUTED,fontFamily:FONT_BODY,fontSize:11}}>→</div>
                <div><span style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY}}>Tgt: </span><span style={{fontSize:13,fontWeight:800,color:G,fontFamily:FONT_DISPLAY}}>≤{g.q2tr}%</span></div>
                <div style={{marginLeft:"auto",fontSize:10,color:MUTED,fontFamily:FONT_BODY}}>Q2: <span style={{fontWeight:700,color:g.q2>g.budget?"#dc2626":g.q2===g.budget?"#ea580c":G}}>{g.q2}</span>/{g.budget}</div>
              </div>
            ) : (
              <div style={{fontSize:11,color:MUTED,fontFamily:FONT_BODY,fontStyle:"italic"}}>No Q1 baseline · April: {g.apr} churn{g.apr===1?"":"s"}</div>
            )}
          </div>
          
          {/* MEETINGS ROW */}
          <div style={{background:"#141414",borderRadius:4,padding:"10px 12px",border:"1px solid "+BORDER2}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <div style={{fontSize:8,color:MUTED,fontFamily:FONT_BODY,fontWeight:700,letterSpacing:"0.8px"}}>BOOKED MEETINGS / ACCT</div>
              <div style={{fontSize:8,color:MUTED,fontFamily:FONT_BODY,fontWeight:700,letterSpacing:"0.8px"}}>GOAL: 4</div>
            </div>
            {g.mtgApr !== null ? (
              <div>
                <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:5}}>
                  <div style={{fontSize:16,fontWeight:800,color:mtgColor,fontFamily:FONT_DISPLAY}}>{g.mtgApr.toFixed(2)}</div>
                  <div style={{fontSize:11,color:MUTED,fontFamily:FONT_BODY}}>({g.mtgPct}% of goal)</div>
                  {g.mtgDelta !== null && <div style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:g.mtgDelta>0?"#16a34a":(g.mtgDelta<0?"#dc2626":MUTED),fontFamily:FONT_DISPLAY}}>{g.mtgDelta>0?"+":""}{g.mtgDelta.toFixed(2)} vs Mar</div>}
                </div>
                <div style={{height:4,background:"#2a2a2a",borderRadius:2,overflow:"hidden"}}>
                  <div style={{width:Math.min(100, g.mtgPct)+"%",height:"100%",background:mtgColor}}/>
                </div>
              </div>
            ) : (
              <div style={{fontSize:11,color:MUTED,fontFamily:FONT_BODY,fontStyle:"italic"}}>No April SDR activity (Landbase accounts)</div>
            )}
          </div>
          
          <div style={{fontSize:9,color:MUTED,fontFamily:FONT_BODY,marginTop:10,fontStyle:"italic"}}>Click to view full detail →</div>
        </div>);
      })}
    </div>
    
    {noSom && (<div style={{background:"#2a1e0e",border:"1px solid #4a2f14",borderLeft:"3px solid #ea580c",borderRadius:6,padding:"12px 16px",marginBottom:20,cursor:"pointer"}} onClick={()=>onSelect("No SOM Account")}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:TEXT,fontFamily:FONT_DISPLAY}}>No SOM Account (Structural Risk)</div>
          <div style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY,marginTop:2}}>{noSom.active} active &middot; {noSom.churned} churned &middot; Q1: {noSom.q1r}% → Q2 Tgt: ≤{noSom.q2tr}% &middot; May: {noSom.mayR}% ({noSom.may} churn{noSom.may===1?"":"s"}) &middot; Apr: {noSom.aprR}% &middot; Mtg/acct: {noSom.mtgApr!==null?noSom.mtgApr.toFixed(2):"—"}</div>
        </div>
        <div style={{fontSize:10,color:"#ea580c",fontFamily:FONT_BODY,fontWeight:700,whiteSpace:"nowrap"}}>View detail →</div>
      </div>
    </div>)}
  </div>);
}

// ─── SALES REPS LEADERBOARD ───────────────────────────────────────────────
function RepLeaderboard({onSelect}){
  // Apr 15 ranking (30-day window 3/16 → 4/15/2026) — third data point for rank streak detection
  const MAR15_RANKS = {
    "Dominic Libertoski":1, "Kellee Madonia":2, "Jesse Shorr":3, "Joshua Bylsma":4, "Eric Tuttle":5, "Alyssa Perez":6, "Harjit Sawhney":7, "Anand Pandey":8, "Blake Peremel":9, "Tim Lan":10, "Ariel Wolfe":11, "Cesar Garcia":12, "Rebecca Barnes":13, "Paige Givinsky":14, "Derek Sindelman":15, "Stephanie Hackert":16, "Michele Harris":17, "Francois Dore":18, "Bill O'Leary":19, "Logan Kennedy":20, "Korbin Kirk":21, "Daniel Davies":22, "Joshua Crawford":23, "Alli Fowler":24, "Johan Vrey":25, "Savannah Peck":26, "Javion Jones":27, "Anthony Allen":28, "Mark Kreidler":29, "Elisha Johnson":30
  };

  const ranked = Object.entries(REP_PACE)
    .filter(([name,p]) => p.aprRank != null)
    .map(([name,p]) => {
      const moved = p.marchRank != null ? (p.marchRank - p.aprRank) : null;
      // Rank streak across last 3 published rankings: Apr 15, May 15 (marchRank slot), Jul 15 (aprRank slot) — no June report
      const marR = MAR15_RANKS[name] ?? null;
      const aprR = p.marchRank;
      const mayR = p.aprRank;
      const allThree = marR!=null && aprR!=null && mayR!=null;
      // Tier the streak by consistency
      let streakTier = null;          // null = no streak
      let streakLabel = "";
      if (allThree) {
        if (marR === aprR && aprR === mayR) {
          streakTier = "lock";
          streakLabel = `LOCKED #${mayR} · 3 RANKINGS`;
        } else if (marR<=3 && aprR<=3 && mayR<=3) {
          streakTier = "top3";
          streakLabel = "TOP 3 · 3 RANKINGS";
        } else if (marR<=5 && aprR<=5 && mayR<=5) {
          streakTier = "top5";
          streakLabel = "TOP 5 · 3 RANKINGS";
        } else if (marR<=10 && aprR<=10 && mayR<=10) {
          streakTier = "top10";
          streakLabel = "TOP 10 · 3 RANKINGS";
        }
      }
      return {
        name,
        aprRank: p.aprRank,
        marchRank: p.marchRank,
        curMQL: p.curMQL || 0,
        curSQL: p.curSQL || 0,
        curMtg: p.curMtg || 0,
        streakTier,
        streakLabel,
        marR, aprR, mayR,
        moved,
      };
    })
    .sort((a,b) => a.aprRank - b.aprRank);
  
  // Outstanding increases: booked meetings vs May report (6/16-7/15 vs 4/16-5/15 — no June rep report)
  const gainers = ranked
    .map(r => {
      const p = REP_PACE[r.name];
      const prevMtg = r.marchRank != null ? (p.marchFlips || 0) : null;
      const delta = prevMtg != null ? r.curMtg - prevMtg : null;
      return {...r, prevMtg, delta, isNew: r.marchRank == null && r.curMtg > 0};
    })
    .filter(r => (r.delta != null && r.delta > 0) || (r.isNew && r.curMtg >= 5))
    .sort((a,b) => ((b.delta ?? b.curMtg) - (a.delta ?? a.curMtg)))
    .slice(0, 6);
  const totCurMtg = ranked.reduce((s,r)=>s+(r.curMtg||0),0);
  const totPrevMtg = ranked.reduce((s,r)=>{const p=REP_PACE[r.name];return s+((r.marchRank!=null?p.marchFlips:0)||0);},0);
  const teamMtgDelta = totCurMtg - totPrevMtg;
  const teamMtgPct = totPrevMtg>0 ? Math.round((teamMtgDelta/totPrevMtg)*100) : null;

  const NON_RANKED = [
    {name:"Angela Hamilton", note:"SOM — not ranked", mql:27, sql:24, mtg:17},
    {name:"Unattributed", note:"No lead owner on sheet", mql:15, sql:19, mtg:15},
  ];

  const topThree = ranked.slice(0, 3);
  const rest = ranked.slice(3);
  
  const rankColor = (r) => r === 1 ? "#ffd700" : r === 2 ? "#c0c0c0" : r === 3 ? "#cd7f32" : MUTED;
  const rankBg = (r) => r === 1 ? "linear-gradient(135deg, #2a2410 0%, #141414 60%)" : r === 2 ? "linear-gradient(135deg, #1e1e1e 0%, #141414 60%)" : r === 3 ? "linear-gradient(135deg, #1f1410 0%, #141414 60%)" : CARD;
  
  const moveIndicator = (moved) => {
    if (moved == null) return null;
    if (moved > 0) return {arrow:"↑", color:"#8ed122", text:"+"+moved};
    if (moved < 0) return {arrow:"↓", color:"#f85149", text:""+moved};
    return {arrow:"↔", color:MUTED, text:"—"};
  };

  // Streak badge styling by tier
  const streakStyle = (tier) => {
    if (tier === "lock")  return {bg:"#3a2a05",border:"#ffd700",col:"#ffd700",fire:"🔥🔥🔥"};
    if (tier === "top3")  return {bg:"#2a1e0e",border:"#f59e0b",col:"#f59e0b",fire:"🔥🔥"};
    if (tier === "top5")  return {bg:"#2a1e0e",border:"#f59e0b88",col:"#f59e0b",fire:"🔥"};
    if (tier === "top10") return {bg:"#1f1810",border:"#a06012",col:"#d97706",fire:"🔥"};
    return null;
  };
  
  return (<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <div>
        <div style={{fontSize:26,fontWeight:900,color:TEXT,fontFamily:FONT_DISPLAY,letterSpacing:"-0.8px"}}>Sales Rep <span style={{color:G}}>Leaderboard</span></div>
        <div style={{fontSize:12,color:MUTED,fontFamily:FONT_BODY,marginTop:4}}>July 15 Final Rankings — 30-day period 6/16–7/15/2026 · SQLs include booked meetings · Click a rep to view their full dashboard</div>
      </div>
      <div style={{fontSize:11,color:MUTED,fontFamily:FONT_BODY,letterSpacing:"1.2px",textTransform:"uppercase"}}>{ranked.length} ranked reps</div>
    </div>

    {/* Outstanding increases banner */}
    {gainers.length>0 && (
    <div style={{background:"linear-gradient(135deg, #20200a 0%, #141414 65%)",border:"1px solid #3a3512",borderLeft:"3px solid #ffd700",borderRadius:10,padding:"14px 18px",marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:800,color:"#ffd700",fontFamily:FONT_BODY,letterSpacing:"1.5px",textTransform:"uppercase"}}>🚀 Outstanding Increases — Booked Meetings vs May Report (4/16–5/15)</div>
        <div style={{fontSize:11,color:MUTED,fontFamily:FONT_BODY}}>Ranked reps: <span style={{color:G,fontWeight:800}}>{totCurMtg}</span> vs {totPrevMtg} in May report{teamMtgPct!=null && <span style={{color:G,fontWeight:800}}> · +{teamMtgDelta} ({teamMtgPct>0?"+":""}{teamMtgPct}%)</span>} · Team total incl. non-ranked: 374</div>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {gainers.map(g=>(
          <div key={g.name} onClick={()=>onSelect(g.name)} style={{background:"#191919",border:"1px solid #3a3512",borderRadius:8,padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
            <div>
              <div style={{fontSize:12,fontWeight:800,color:TEXT,fontFamily:FONT_DISPLAY}}>{g.name}</div>
              <div style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY,marginTop:1}}>{g.isNew?"first ranked period":`${g.prevMtg} → ${g.curMtg} meetings`}</div>
            </div>
            <div style={{fontSize:16,fontWeight:900,color:"#8ed122",fontFamily:FONT_DISPLAY}}>{g.isNew?`${g.curMtg} NEW`:`+${g.delta}`}</div>
          </div>
        ))}
      </div>
    </div>)}

    {/* Top 3 podium */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))",gap:12,marginBottom:20}}>
      {topThree.map(r => {
        const mv = moveIndicator(r.moved);
        const ss = streakStyle(r.streakTier);
        return (<div key={r.name} onClick={()=>onSelect(r.name)} style={{background:rankBg(r.aprRank),border:"1px solid "+BORDER,borderLeft:"3px solid "+rankColor(r.aprRank),borderRadius:10,padding:"20px 22px",cursor:"pointer",position:"relative",overflow:"hidden",transition:"transform 0.15s",minHeight:160}}
          onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
          onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div style={{fontSize:48,fontWeight:900,color:rankColor(r.aprRank),fontFamily:FONT_DISPLAY,lineHeight:0.9,letterSpacing:"-2px"}}>#{r.aprRank}</div>
              {ss && (
                <div title={`Rank history (Apr/May/Jul): #${r.marR} → #${r.aprR} → #${r.mayR}`} style={{background:ss.bg,border:`1px solid ${ss.border}`,color:ss.col,borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:800,fontFamily:FONT_BODY,letterSpacing:"0.5px",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>
                  {ss.fire} {r.streakLabel}
                </div>
              )}
            </div>
            {mv && (<div style={{color:mv.color,fontSize:13,fontWeight:800,fontFamily:FONT_DISPLAY}}>{mv.arrow} {mv.text}</div>)}
          </div>
          <div style={{fontSize:20,fontWeight:800,color:TEXT,fontFamily:FONT_DISPLAY,marginBottom:12,letterSpacing:"-0.3px"}}>{r.name}</div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {[["MQLs",r.curMQL,G],["SQLs",r.curSQL,"#58a6ff"],["MEETINGS",r.curMtg,"#bc8cff"]].map(([l,v,c]) => (
              <div key={l}>
                <div style={{fontSize:8,color:MUTED,fontFamily:FONT_BODY,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase"}}>{l}</div>
                <div style={{fontSize:22,fontWeight:900,color:c,fontFamily:FONT_DISPLAY,lineHeight:1,letterSpacing:"-0.5px"}}>{v}</div>
              </div>
            ))}
          </div>
        </div>);
      })}
    </div>
    
    {/* Rest of leaderboard */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(260px, 1fr))",gap:8}}>
      {rest.map(r => {
        const mv = moveIndicator(r.moved);
        const ss = streakStyle(r.streakTier);
        return (<div key={r.name} onClick={()=>onSelect(r.name)} style={{background:CARD,border:"1px solid "+BORDER,borderRadius:8,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"transform 0.15s"}}

        </div>);
      })}
    </div>

    {/* Unattributed & non-ranked production */}
    <div style={{marginTop:24}}>
      <div style={{fontSize:11,fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",color:MUTED,fontFamily:FONT_BODY,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:16,height:2,background:MUTED}}/>Unattributed & Non-Ranked Production

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(260px, 1fr))",gap:8}}>

            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:TEXT,fontFamily:FONT_DISPLAY}}>{r.name}</div>
              <div style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY,marginTop:2}}>
                <span style={{color:G}}>{r.mql}</span>M &nbsp;<span style={{color:"#58a6ff"}}>{r.sql}</span>S &nbsp;<span style={{color:"#bc8cff"}}>{r.mtg}</span>Mt

      <div style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY,marginTop:8}}>
        Counted in the 374 team total; excluded from rep ranking. Also logged this window: Merv 1 Mtg / 1 SQL · Matt Guthrie 1 SQL · Grant Paris 3 MQL · Venus Powers 1 MQL · Alex (Aixigo) 3 MQL. SQLs include booked meetings.
      </div>
    </div>
  </div>);
}

// ─── SDR PERFORMANCE DASHBOARD TAB ───────────────────────────────────────────
const SDR_DARK="#0d1117",SDR_CARD="#161b22",SDR_CARD2="#21262d",SDR_BORDER="#30363d";
const SDR_TEXT="#e6edf3",SDR_MUTED="#8b949e",SDR_GREEN="#3fb950",SDR_YELLOW="#d29922";
const SDR_RED="#f85149",SDR_BLUE="#58a6ff",SDR_PURPLE="#bc8cff";
const MTG_TARGET=8.5;
function sdrScore(rep,period="prev"){
  const mtg=period==="prev"?(rep.marchFlips||0):(rep.curMtg||0);
  const sql=period==="prev"?(rep.marchSQL||0):(rep.curSQL||0);
  return Math.round(((mtg/MTG_TARGET)*2.4+(sql/12)*1.0)*10)/10;
}
const SDR_PASS=3.5,SDR_ACT=3.0;
const SDR_REPS=Object.entries(REP_PACE).map(([name,p])=>({name,marchRank:p.marchRank,marchFlips:p.marchFlips,marchSQL:p.marchSQL,marchMQL:p.marchMQL,curMtg:p.curMtg,curSQL:p.curSQL,curMQL:p.curMQL}));
function sdrBand(s){return s>=SDR_PASS?"pass":s>=SDR_ACT?"observe":"below";}
function bandCol(b){return b==="pass"?SDR_GREEN:b==="observe"?SDR_YELLOW:SDR_RED;}

function SDRDashboard({cms}){
  const [subTab,setSubTab]=useState("overview");

  const PERIOD_LABEL=period==="prev"?"Apr 16 – May 15, 2026":"Jun 16 – Jul 15, 2026";
  const repsWithScore=SDR_REPS.map(r=>({...r,score:sdrScore(r,period),actScore:SDR_ACT,mtg:period==="prev"?(r.marchFlips||0):(r.curMtg||0),sql:period==="prev"?(r.marchSQL||0):(r.curSQL||0),mql:period==="prev"?(r.marchMQL||0):(r.curMQL||0)})).map(r=>({...r,band:sdrBand(r.score)}));
  const pass=repsWithScore.filter(r=>r.band==="pass").length;
  const observe=repsWithScore.filter(r=>r.band==="observe").length;
  const below=repsWithScore.filter(r=>r.band==="below").length;
  const avgScore=(repsWithScore.reduce((s,r)=>s+r.score,0)/repsWithScore.length).toFixed(2);
  const teamMtg=repsWithScore.reduce((s,r)=>s+r.mtg,0);
  const teamSQL=repsWithScore.reduce((s,r)=>s+r.sql,0);
  const teamMQL=repsWithScore.reduce((s,r)=>s+r.mql,0);
  const filtered=repsWithScore.filter(r=>filter==="all"||r.band===filter);
  const sorted=[...filtered].sort((a,b)=>sortBy==="score"?b.score-a.score:sortBy==="mtg"?b.mtg-a.mtg:sortBy==="sql"?b.sql-a.sql:b.mql-a.mql);
  const SUBTABS=["overview","current month","score trends","heatmap","pacing","rep detail"];

            <div key={id} style={{background:col+"22",border:`1px solid ${col}55`,color:col,borderRadius:20,padding:"5px 16px",fontSize:12,fontWeight:700,fontFamily:FONT_BODY}}>{id==="pass"?"✓":id==="observe"?"⚠":"●"} {label}</div>

        </div>

      {/* Info banner */}

                  <span style={{position:"absolute",top:y-6,left:0,fontSize:9,color:SDR_MUTED,fontFamily:FONT_BODY}}>{v}</span></g>);})}

function loadCMS(){
  try{
    const s=localStorage.getItem("martal_cms");
    if(!s) return DEFAULT_CMS;
    const cms=JSON.parse(s);
    // One-time migration: April 2026 close. Force-refresh stale churn lock + meta.
    if(cms?.churn?.lockedMonth==="Mar 26"||cms?.churn?.lockedValue==="9.62"){
      cms.churn.lockedValue="12.15";
      cms.churn.lockedMonth="Apr 26";
      cms.churn.lockedLabel="Previous Month Churn (April 2026)";
      if(cms.meta) cms.meta.lastUpdated="May 4, 2026";
      try{localStorage.setItem("martal_cms",JSON.stringify(cms));}catch{}
    }
    // One-time migration: July 2026 ranking close. Refresh stale period meta.
    if(cms?.meta?.period==="Period 5/16–6/15/2026"){
      cms.meta.period="Period 6/16–7/15/2026";
      cms.meta.lastUpdated="July 15, 2026";
      try{localStorage.setItem("martal_cms",JSON.stringify(cms));}catch{}
    }
    return cms;
  }
  catch{return DEFAULT_CMS;}
}
function saveCMS(c){try{localStorage.setItem("martal_cms",JSON.stringify(c));}catch{}}

// ─── COMPANY CHURN TAB (company-wide churn — month-end basis) ──────────────
function CompanyChurnTab(){
  const data = CD;
  const last = data[data.length-1];                 // May 26
  const denom = (data[data.length-2].ac + data[data.length-3].ac + data[data.length-4].ac)/3;
  const recent = data.slice(-18);
  const ytd = data.filter(d=>d.m.endsWith(" 26")).reduce((s,d)=>s+d.cl,0);
  const prevCr = data[data.length-2].cr;
  const crDelta = (last.cr!=null && prevCr!=null) ? +(last.cr-prevCr).toFixed(2) : null;

  // May churn by reason (from account-level data, end === "May 26")
  const mayCh = SOMS.flatMap(s=>s.accounts).filter(a=>a.end==="May 26");
  const rmap={};
  mayCh.forEach(a=>{const r=a.reason||"Uncategorized"; if(!rmap[r])rmap[r]={n:0,w:0}; rmap[r].n++; rmap[r].w+=(PEN[r]||1);});
  const reasons=Object.entries(rmap).map(([r,v])=>({r,n:v.n,w:v.w})).sort((a,b)=>b.w-a.w||b.n-a.n);
  const maxReasonN=Math.max(...reasons.map(x=>x.n),1);
  const totWeight=reasons.reduce((s,x)=>s+x.w,0);

  // Per-SOM May churn
  const somRows=Object.entries(CHURN_GOALS)
    .map(([name,g])=>({name:name.indexOf(" (")!==-1?name.split(" (")[0]:name, may:g.may||0, mayR:g.mayR||0, mayn:g.mayn||[], aprR:g.aprR}))
    .filter(x=>x.may>0).sort((a,b)=>b.may-a.may||b.mayR-a.mayR);

  const crColor=crCol(last.cr);
  return (<div>
    {/* headline note */}
    <div style={{fontSize:11,color:MUTED,fontFamily:FONT_BODY,marginBottom:16,lineHeight:1.5}}>
      Company-wide churn for <span style={{color:TEXT,fontWeight:700}}>May 2026</span>, measured at month-end (calendar month, through May 31).
      Churn rate = contracts lost ÷ trailing 3-month average of active clients. <span style={{color:MUTED2}}>Performance metrics elsewhere are mid-month (15th) — different cadence.</span>
    </div>

    {/* stat cards */}
    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>
      <KpiCard label="MAY CHURN RATE" value={last.cr!=null?last.cr+"%":"—"} sub={crDelta!=null?(crDelta>0?"▲ +":"▼ ")+crDelta+" pts vs April":"—"} valColor={crColor}/>
      <KpiCard label="MAY CANCELS" value={last.cl} sub={"vs "+data[data.length-2].cl+" in April"} valColor="#ef4444"/>
      <KpiCard label="3-MO AVG ACTIVE (DENOM)" value={denom.toFixed(1)} sub="Feb / Mar / Apr active avg" valColor={TEXT}/>
      <KpiCard label="2026 YTD CANCELS" value={ytd} sub="Jan–May 2026" valColor="#f59e0b"/>
    </div>

    {/* churn rate trend */}
    <div style={CS}>
      <SectionLabel>Company Churn Rate — Trailing 18 Months (month-end)</SectionLabel>
      <SvgBarChart data={recent} dataKey="cr" colorFn={crCol} xKey="m" yFmt={v=>`${v}%`} height={150}/>
      <div style={{fontSize:10,color:MUTED2,fontFamily:FONT_BODY,marginTop:6}}>Green &lt;10% · yellow 10–15% · orange 15–20% · red ≥20%. May spiked to {last.cr}% on {last.cl} cancellations.</div>
    </div>

    {/* monthly cancels */}
    <div style={CS}>
      <SectionLabel>Contracts Lost per Month</SectionLabel>
      <SvgBarChart data={recent} dataKey="cl" colorFn={()=>"#ef4444"} xKey="m" yFmt={v=>v} height={130}/>
    </div>

    {/* churn by reason (May) */}
    <div style={CS}>
      <SectionLabel>May Churn by Reason — Count &amp; Weighted Impact</SectionLabel>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>
        {reasons.map((x,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:140,fontSize:11,color:TEXT,fontFamily:FONT_BODY,fontWeight:600,textAlign:"right",flexShrink:0}}>{x.r}</div>
            <div style={{flex:1,height:18,background:"#1a1a1a",borderRadius:3,overflow:"hidden",position:"relative"}}>
              <div style={{width:(x.n/maxReasonN*100)+"%",height:"100%",background:rsnCol(x.r==="Uncategorized"?null:x.r)}}/>
            </div>
            <div style={{width:120,fontSize:10,color:MUTED,fontFamily:FONT_MONO,flexShrink:0}}>{x.n} acct{x.n===1?"":"s"} · wt {x.w}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:10,color:MUTED2,fontFamily:FONT_BODY,marginTop:10}}>
        {mayCh.length} total May cancellations · weighted churn-impact score {totWeight} (penalty by reason: Rep/Ops Issue=8, Lack of Results/No Closed Deals=6, Single Rep/No Show=5, Poor List/Slow Start=3, Leadership=2, Budget/Didn't Pay/Landbase/uncategorized=1).
      </div>
    </div>

    {/* per-SOM May churn */}
    <div style={CS}>
      <SectionLabel>May Churn by Sales Ops Manager (month-end)</SectionLabel>
      <table style={{width:"100%",borderCollapse:"collapse",fontFamily:FONT_BODY}}>
        <thead><tr style={{borderBottom:"1px solid "+BORDER2}}>
          {["SOM","May Churns","May Rate","Apr Rate","Accounts Lost"].map((h,i)=>(
            <th key={i} style={{textAlign:i<1?"left":i<4?"center":"left",fontSize:9,color:MUTED,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",padding:"8px 10px"}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {somRows.map((r,i)=>{
            const rc = r.mayR===0?G:r.mayR<=10?G:r.mayR<=20?"#f59e0b":"#ef4444";
            return (<tr key={i} style={{borderBottom:"1px solid "+BORDER}}>
              <td style={{padding:"9px 10px",fontSize:12,color:TEXT,fontWeight:600}}>{r.name}</td>
              <td style={{padding:"9px 10px",fontSize:13,color:"#ef4444",fontWeight:800,fontFamily:FONT_DISPLAY,textAlign:"center"}}>{r.may}</td>
              <td style={{padding:"9px 10px",fontSize:13,color:rc,fontWeight:800,fontFamily:FONT_DISPLAY,textAlign:"center"}}>{r.mayR}%</td>
              <td style={{padding:"9px 10px",fontSize:11,color:MUTED,fontFamily:FONT_MONO,textAlign:"center"}}>{r.aprR!=null?r.aprR+"%":"—"}</td>
              <td style={{padding:"9px 10px"}}>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {r.mayn.map((n,j)=><span key={j} style={{fontSize:9.5,padding:"2px 8px",background:"#20242b",color:MUTED,borderRadius:3,fontFamily:FONT_BODY}}>{n}</span>)}
                </div>
              </td>
            </tr>);
          })}
        </tbody>
      </table>
      <div style={{fontSize:10,color:MUTED2,fontFamily:FONT_BODY,marginTop:10}}>Per-SOM rate = that SOM's May churns ÷ avg(active Feb/Mar/Apr) × 100. Total {somRows.reduce((s,r)=>s+r.may,0)} accounts lost across all portfolios.</div>
    </div>
  </div>);
}
